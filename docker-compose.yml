version: '3.9'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    volumes:
      - ./data:/data:ro   # maps to ../data relative to /app (server workdir)

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_SERVER_URL=${VITE_SERVER_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

# Usage:
#   cp .env.example .env && nano .env   # add your SPORTRADAR_KEY
#   docker compose up -d
#   open http://localhost:8080
